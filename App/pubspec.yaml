name: querymate
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  path: ^1.8.3
  lottie: ^3.1.0
  url_launcher: ^6.3.0
  http: ^1.2.2
  dio: ^5.4.0
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: ^2.3.11

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  # Ensure no adaptive_icon tags are present, as they cause the small size issue!

flutter_native_splash:
  color: "#FFFFFF" # Pure white background
  image: "assets/app_icon.png" # The image the splash screen will use
  android_gravity: center
  ios_content_mode: center

# --- ASSET DECLARATION ---
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo.json